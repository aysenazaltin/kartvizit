<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Dijital Kartvizit</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    text-align: center;
}

input {
    display: block;
    margin: 10px auto;
    padding: 10px;
    width: 250px;
}

button {
    padding: 10px;
    border: none;
    background: black;
    color: white;
}

.card {
    background: white;
    padding: 20px;
    margin: 30px auto;
    width: 300px;
    border-radius: 20px;
    display: none;
}
</style>

</head>

<body>

<div id="form">
    <h2>Kartvizit Oluştur</h2>

    <input id="ad" placeholder="Ad">
    <input id="meslek" placeholder="Meslek">
    <input id="ilgi" placeholder="İlgi">
    <input id="email" placeholder="Email">
    <input id="linkedin" placeholder="LinkedIn">

    <button onclick="olustur()">QR Oluştur</button>

    <div id="qrcode"></div>
</div>

<div class="card" id="cv">
    <h2 id="c_ad"></h2>
    <p id="c_meslek"></p>
    <p id="c_ilgi"></p>
    <p id="c_email"></p>
    <a id="c_linkedin" target="_blank">LinkedIn</a>
    <br><br>
    <button onclick="pdf()">PDF İndir</button>
</div>

<script>

// SAYFA AÇILINCA
let params = new URLSearchParams(window.location.search);
let data = params.get("data");

if(data){
    let arr = data.split("|");

    document.getElementById("form").style.display = "none";
    document.getElementById("cv").style.display = "block";

    document.getElementById("c_ad").innerText = arr[0];
    document.getElementById("c_meslek").innerText = arr[1];
    document.getElementById("c_ilgi").innerText = arr[2];
    document.getElementById("c_email").innerText = arr[3];

    document.getElementById("c_linkedin").href = arr[4];
}


// QR OLUŞTUR
function olustur(){

    let veri = [
        document.getElementById("ad").value,
        document.getElementById("meslek").value,
        document.getElementById("ilgi").value,
        document.getElementById("email").value,
        document.getElementById("linkedin").value
    ].join("|");

    let link = window.location.href.split("?")[0] + "?data=" + veri;

    document.getElementById("qrcode").innerHTML = "";
    new QRCode(document.getElementById("qrcode"), link);
}


// PDF
function pdf(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.text(document.getElementById("c_ad").innerText, 10, 10);
    doc.text(document.getElementById("c_meslek").innerText, 10, 20);
    doc.text(document.getElementById("c_ilgi").innerText, 10, 30);
    doc.text(document.getElementById("c_email").innerText, 10, 40);

    doc.save("cv.pdf");
}

</script>

</body>
</html>
