<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayşenaz Altın | Profesyonel Kartvizit</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: #1e293b; width: 100%; max-width: 380px; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); padding: 30px; text-align: center; border: 1px solid #334155; }
        
        /* Profil Başlık */
        .profile-header { margin-bottom: 25px; }
        .profile-header h1 { font-size: 24px; color: #38bdf8; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        .profile-header p { font-size: 15px; color: #94a3b8; margin: 5px 0; }
        
        /* Bilgi Listesi (İkinci görseldeki gibi) */
        .info-list { text-align: left; background: #0f172a; padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        .info-item { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; font-size: 14px; color: #f1f5f9; text-decoration: none; }
        .info-item i { color: #38bdf8; width: 20px; text-align: center; }
        .info-label { font-weight: 600; color: #38bdf8; min-width: 70px; }

        /* Sosyal Medya Linkleri */
        .social-links { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .social-btn { width: 45px; height: 45px; border-radius: 50%; background: #334155; display: flex; justify-content: center; align-items: center; color: white; text-decoration: none; transition: 0.3s; font-size: 20px; }
        .social-btn:hover { background: #38bdf8; transform: translateY(-3px); }

        /* Aksiyon Butonları */
        .btn { width: 100%; padding: 12px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; margin-top: 10px; transition: 0.3s; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-pdf { background: #10b981; color: white; }
        .btn-qr { background: #38bdf8; color: #0f172a; }
        .btn:hover { opacity: 0.9; transform: scale(1.02); }

        #qrDisplay { display: none; margin-top: 20px; padding: 15px; background: white; border-radius: 15px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="card" id="captureArea">
    <div class="profile-header">
        <h1>Ayşenaz Altın</h1>
        <p>Elektrik Elektronik Mühendisi</p>
    </div>

    <div class="info-list">
        <a href="tel:05438745987" class="info-item">
            <i class="fas fa-phone"></i>
            <span class="info-label">Telefon:</span> 0543 874 59 87
        </a>
        <a href="mailto:aysenazaltin@gmail.com" class="info-item">
            <i class="fas fa-envelope"></i>
            <span class="info-label">E-Posta:</span> aysenazaltin@gmail.com
        </a>
        <div class="info-item">
            <i class="fas fa-briefcase"></i>
            <span class="info-label">Meslek:</span> Elektrik Elektronik
        </div>
        <div class="info-item">
            <i class="fas fa-star"></i>
            <span class="info-label">İlgiler:</span> Sanat, Kodlama
        </div>
    </div>

    <div class="social-links">
        <a href="https://linkedin.com" target="_blank" class="social-btn"><i class="fab fa-linkedin"></i></a>
        <a href="https://instagram.com" target="_blank" class="social-btn"><i class="fab fa-instagram"></i></a>
        <a href="https://github.com" target="_blank" class="social-btn"><i class="fab fa-github"></i></a>
    </div>

    <button class="btn btn-qr" onclick="showQR()">
        <i class="fas fa-qrcode"></i> REHBERE EKLE (QR)
    </button>
    
    <button class="btn btn-pdf" onclick="downloadPDF()">
        <i class="fas fa-file-pdf"></i> KARTVİZİTİ İNDİR (PDF)
    </button>

    <div id="qrDisplay">
        <div id="qrImage"></div>
        <p style="color: #0f172a; font-size: 11px; margin-top: 5px;">Kodu kamerayla okutun.</p>
    </div>
</div>

<script>
    function showQR() {
        const vCard = `BEGIN:VCARD\nVERSION:3.0\nFN:Ayşenaz Altın\nTITLE:Elektrik Elektronik Mühendisi\nTEL:05438745987\nEMAIL:aysenazaltin@gmail.com\nEND:VCARD`;
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(vCard)}`;
        document.getElementById("qrImage").innerHTML = `<img src="${qrUrl}" alt="QR">`;
        document.getElementById("qrDisplay").style.display = "block";
    }

    function downloadPDF() {
        const element = document.getElementById('captureArea');
        const opt = {
            margin: 10,
            filename: 'Aysenaz_Altin_Kartvizit.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 3 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().from(element).set(opt).save();
    }
</script>

</body>
</html>
