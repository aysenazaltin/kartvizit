<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diji-Card | Dijital Kimlik</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: var(--card); padding: 40px; border-radius: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 100%; max-width: 400px; border: 1px solid #334155; text-align: center; }
        h2 { color: var(--accent); margin-bottom: 30px; font-weight: 700; letter-spacing: -1px; }
        .form-group { text-align: left; margin-bottom: 12px; }
        label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-left: 5px; }
        input { width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; outline: none; margin-top: 5px; transition: 0.3s; }
        .main-btn { width: 100%; padding: 16px; background: var(--accent); color: var(--bg); border: none; border-radius: 15px; font-weight: 700; cursor: pointer; margin-top: 20px; font-size: 14px; }
        #resultArea { display: none; animation: fadeInUp 0.5s ease; }
        #qrImg { background: white; padding: 15px; border-radius: 20px; width: 160px; margin-bottom: 15px; }
        .action-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 25px 0; }
        .btn-small { padding: 14px; border-radius: 12px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; color: white; text-align: center; text-decoration: none; display: block; }
        .btn-save { background: #10b981; } 
        .btn-cv { background: #f59e0b; }
        .info-display { background: rgba(15, 23, 42, 0.7); padding: 25px; border-radius: 20px; text-align: left; border: 1px solid #334155; }
        .info-row { margin-bottom: 12px; font-size: 14px; display: flex; align-items: flex-start; border-bottom: 1px solid rgba(51, 65, 85, 0.5); padding-bottom: 8px; }
        .info-row b { color: var(--accent); width: 95px; flex-shrink: 0; font-size: 11px; text-transform: uppercase; }
        .info-row span { color: #cbd5e1; word-break: break-all; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h2 id="pageTitle">DIJI-CARD</h2>
    
    <div id="formArea">
        <div class="form-group"><label>Ad Soyad</label><input type="text" id="name" placeholder="Ayşenaz Altın"></div>
        <div class="form-group"><label>Meslek</label><input type="text" id="job" placeholder="Elektrik Elektronik Mühendisi"></div>
        <div class="form-group"><label>Telefon</label><input type="tel" id="phone" placeholder="05XXXXXXXXX"></div>
        <div class="form-group"><label>E-posta</label><input type="email" id="email" placeholder="mail@gmail.com"></div>
        <div class="form-group"><label>LinkedIn (URL)</label><input type="url" id="linkedin" placeholder="linkedin.com/in/profil"></div>
        <div class="form-group"><label>İlgi Alanları</label><input type="text" id="interests" placeholder="Sanat, Teknoloji"></div>
        <button class="main-btn" onclick="olustur()">PROFESYONEL QR OLUŞTUR</button>
    </div>

    <div id="resultArea">
        <div id="qrContainer">
            <div id="qrPlaceholder"></div>
            <p style="font-size: 10px; color: #94a3b8; margin-bottom: 20px;">Bu QR'ı kaydedip paylaşabilirsiniz.</p>
        </div>
        
        <div class="info-display">
            <div style="font-size: 22px; font-weight: 700; margin-bottom: 15px; color: var(--accent);" id="dName"></div>
            <div class="info-row"><b>Meslek:</b> <span id="dJob"></span></div>
            <div class="info-row"><b>E-posta:</b> <span id="dMail"></span></div>
            <div class="info-row"><b>LinkedIn:</b> <span id="dLink"></span></div>
            <div class="info-row"><b>İlgi Alanı:</b> <span id="dInterests"></span></div>
        </div>

        <div class="action-buttons">
            <a id="vcardLink" class="btn-small btn-save">Rehbere Ekle</a>
            <button class="btn-small btn-cv" onclick="downloadMiniCV()">CV İndir</button>
        </div>
    </div>
</div>

<script>
    let globalData = {};

    function olustur() {
        globalData = {
            n: document.getElementById("name").value,
            j: document.getElementById("job").value,
            p: document.getElementById("phone").value,
            m: document.getElementById("email").value,
            l: document.getElementById("linkedin").value,
            i: document.getElementById("interests").value
        };

        if(!globalData.n || !globalData.p) { alert("Lütfen isim ve telefon giriniz!"); return; }
        
        const baseUrl = window.location.origin + window.location.pathname;
        const params = new URLSearchParams(globalData).toString();
        const finalLink = `${baseUrl}?${params}`;

        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(finalLink)}`;
        document.getElementById("qrPlaceholder").innerHTML = `<img src="${qrUrl}" id="qrImg">`;
        
        displayData(globalData);
    }

    function displayData(data) {
        document.getElementById("formArea").style.display = "none";
        document.getElementById("resultArea").style.display = "block";
        document.getElementById("dName").innerText = data.n;
        document.getElementById("dJob").innerText = data.j || "-";
        document.getElementById("dMail").innerText = data.m || "-";
        document.getElementById("dLink").innerText = data.l || "-";
        document.getElementById("dInterests").innerText = data.i || "-";

        // vCard Linkini Butona Önceden Tanımla (En Güvenli Yol)
        const vcardContent = `BEGIN:VCARD\nVERSION:3.0\nFN:${data.n}\nN:;${data.n};;;\nTEL;TYPE=CELL:${data.p}\nEMAIL;TYPE=INTERNET:${data.m}\nTITLE:${data.j}\nURL:${data.l}\nEND:VCARD`;
        const vcardBase64 = btoa(unescape(encodeURIComponent(vcardContent)));
        document.getElementById("vcardLink").href = "data:text/vcard;base64," + vcardBase64;
        document.getElementById("vcardLink").download = "kartvizit.vcf";
    }

    function downloadMiniCV() {
        const cvHtml = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px; } .card { background: white; width: 350px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 10px solid #38bdf8; } .head { background: #1e293b; color: white; padding: 25px; text-align: center; font-size: 20px; font-weight: bold; } .box { padding: 30px; } .row { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 8px; } .label { color: #38bdf8; font-size: 10px; font-weight: bold; text-transform: uppercase; } .val { color: #1e293b; font-size: 16px; font-weight: 600; display: block; }</style></head><body><div class="card"><div class="head">📇 KARTVİZİT BİLGİLERİ</div><div class="box"><div class="row"><span class="label">İSİM SOYAD</span><span class="val">${globalData.n}</span></div><div class="row"><span class="label">MESLEK</span><span class="val">${globalData.j}</span></div><div class="row"><span class="label">E-POSTA</span><span class="val">${globalData.m}</span></div><div class="row"><span class="label">TELEFON</span><span class="val">${globalData.p}</span></div><div class="row"><span class="label">İLGİ ALANLARI</span><span class="val">${globalData.i || '-'}</span></div></div></div></body></html>`;
        const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), cvHtml], { type: "text/html;charset=utf-8" });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Dijital_Kartvizit.html`;
        a.click();
    }

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.has('n')) {
            globalData = { n: urlParams.get('n'), j: urlParams.get('j'), p: urlParams.get('p'), m: urlParams.get('m'), l: urlParams.get('l'), i: urlParams.get('i') };
            displayData(globalData);
            document.getElementById("qrContainer").style.display = "none";
            document.getElementById("pageTitle").innerText = "KİŞİSEL KART";
        }
    };
</script>

</body>
</html>
