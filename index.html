<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diji-Card Pro | Kendi Kartvizitini Oluştur</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card-bg: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* Form Bölümü */
        .input-container { background: var(--card-bg); padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; margin-bottom: 30px; border: 1px solid #334155; }
        h2 { color: var(--accent); margin-top: 0; text-align: center; font-size: 20px; }
        .input-group { margin-bottom: 12px; text-align: left; }
        label { font-size: 11px; color: #94a3b8; font-weight: 600; }
        input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; margin-top: 5px; box-sizing: border-box; }

        /* Kart Görünümü (Senin Beğendiğin Tasarım) */
        .preview-card { background: var(--card-bg); width: 100%; max-width: 380px; border-radius: 25px; padding: 30px; text-align: center; border: 1px solid #334155; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .p-name { color: var(--accent); font-size: 24px; font-weight: 700; margin: 0; text-transform: uppercase; }
        .p-job { color: #94a3b8; font-size: 14px; margin: 5px 0 20px 0; }
        .info-box { background: #0f172a; padding: 15px; border-radius: 20px; text-align: left; margin-bottom: 20px; }
        .info-row { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; font-size: 13px; }
        .info-row i { color: var(--accent); width: 20px; }
        .info-row b { color: var(--accent); width: 70px; }

        /* Sosyal Medya */
        .social-row { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .social-icon { width: 40px; height: 40px; border-radius: 50%; background: #334155; display: flex; justify-content: center; align-items: center; color: white; text-decoration: none; }

        /* Butonlar */
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn-qr { background: var(--accent); color: #0f172a; }
        .btn-pdf { background: #10b981; color: white; }
        .btn:hover { transform: scale(1.02); opacity: 0.9; }

        #qrArea { display: none; margin-top: 20px; background: white; padding: 15px; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="input-container">
        <h2><i class="fas fa-edit"></i> Bilgilerini Gir</h2>
        <div class="input-group"><label>AD SOYAD</label><input type="text" id="inName" placeholder="Örn: Ayşenaz Altın" onkeyup="live()"></div>
        <div class="input-group"><label>MESLEK</label><input type="text" id="inJob" placeholder="Örn: Mühendis" onkeyup="live()"></div>
        <div class="input-group"><label>TELEFON</label><input type="text" id="inTel" placeholder="05XX XXX XX XX" onkeyup="live()"></div>
        <div class="input-group"><label>E-POSTA</label><input type="text" id="inMail" placeholder="ornek@gmail.com" onkeyup="live()"></div>
        <div class="input-group"><label>INSTAGRAM (Link)</label><input type="text" id="inInsta" placeholder="https://..." onkeyup="live()"></div>
        <button class="btn btn-qr" onclick="genQR()"><i class="fas fa-qrcode"></i> REHBERE EKLE (QR)</button>
    </div>

    <div class="preview-card" id="cardToExport">
        <h1 class="p-name" id="outName">ADINIZ SOYADINIZ</h1>
        <p class="p-job" id="outJob">Mesleğiniz Buraya</p>
        
        <div class="info-box">
            <div class="info-row"><i class="fas fa-phone"></i> <b>Telefon:</b> <span id="outTel">-</span></div>
            <div class="info-row"><i class="fas fa-envelope"></i> <b>E-Posta:</b> <span id="outMail">-</span></div>
            <div class="info-row"><i class="fas fa-briefcase"></i> <b>Meslek:</b> <span id="outJob2">-</span></div>
            <div class="info-row"><i class="fas fa-star"></i> <b>İlgiler:</b> Sanat, Kodlama</div>
        </div>

        <div class="social-row">
            <a href="#" class="social-icon" id="linkInsta"><i class="fab fa-instagram"></i></a>
            <a href="#" class="social-icon"><i class="fab fa-linkedin"></i></a>
            <a href="#" class="social-icon"><i class="fab fa-github"></i></a>
        </div>

        <button class="btn btn-pdf" onclick="pdf()"><i class="fas fa-file-pdf"></i> KARTVİZİTİ İNDİR (PDF)</button>

        <div id="qrArea">
            <div id="qrImg"></div>
            <p style="color:#0f172a; font-size:10px; margin-top:5px;">Okutunca rehbere ekler.</p>
        </div>
    </div>

    <script>
        function live() {
            const name = document.getElementById("inName").value || "ADINIZ SOYADINIZ";
            const job = document.getElementById("inJob").value || "Mesleğiniz Buraya";
            const tel = document.getElementById("inTel").value || "-";
            const mail = document.getElementById("inMail").value || "-";
            const insta = document.getElementById("inInsta").value || "#";

            document.getElementById("outName").innerText = name;
            document.getElementById("outJob").innerText = job;
            document.getElementById("outJob2").innerText = job;
            document.getElementById("outTel").innerText = tel;
            document.getElementById("outMail").innerText = mail;
            document.getElementById("linkInsta").href = insta;
        }

        function genQR() {
            const name = document.getElementById("inName").value;
            const tel = document.getElementById("inTel").value;
            const vcard = `BEGIN:VCARD\nVERSION:3.0\nFN:${name}\nTEL:${tel}\nEND:VCARD`;
            const url = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(vcard)}`;
            document.getElementById("qrImg").innerHTML = `<img src="${url}">`;
            document.getElementById("qrArea").style.display = "block";
        }

        function pdf() {
            const element = document.getElementById('cardToExport');
            html2pdf().from(element).set({
                margin: 10, filename: 'Kartvizit.pdf', html2canvas: { scale: 3 }, jsPDF: { unit: 'mm', format: 'a4' }
            }).save();
        }
    </script>
</body>
                                                                                                          </html>
