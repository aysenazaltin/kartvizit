<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diji-Card | Ayşenaz Altın</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: var(--card); padding: 40px; border-radius: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 100%; max-width: 400px; border: 1px solid #334155; text-align: center; }
        h2 { color: var(--accent); margin-bottom: 30px; font-weight: 700; letter-spacing: -1px; }
        .form-group { text-align: left; margin-bottom: 12px; }
        label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-left: 5px; }
        input { width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; outline: none; margin-top: 5px; transition: 0.3s; }
        
        .main-btn { width: 100%; padding: 16px; background: var(--accent); color: var(--bg); border: none; border-radius: 15px; font-weight: 700; cursor: pointer; margin-top: 20px; font-size: 14px; }
        
        #resultArea { display: none; animation: fadeInUp 0.5s ease; }
        #qrImg { background: white; padding: 15px; border-radius: 20px; width: 150px; margin-bottom: 20px; }
        
        .action-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .btn-small { padding: 14px; border-radius: 12px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; transition: 0.2s; color: white; text-decoration: none; }
        .btn-save { background: #10b981; } /* Yeşil */
        .btn-cv { background: #f59e0b; }   /* Turuncu */
        .btn-small:hover { opacity: 0.9; transform: scale(1.02); }
        
        .info-display { background: rgba(15, 23, 42, 0.8); padding: 25px; border-radius: 20px; text-align: left; border: 1px solid #334155; }
        .info-row { margin-bottom: 10px; font-size: 14px; display: flex; align-items: flex-start; }
        .info-row b { color: var(--accent); width: 90px; flex-shrink: 0; }
        .info-row span { color: #cbd5e1; word-break: break-all; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h2 id="title">DIJI-CARD</h2>
    
    <div id="formArea">
        <div class="form-group"><label>Ad Soyad</label><input type="text" id="name" placeholder="Ayşenaz Altın"></div>
        <div class="form-group"><label>Meslek</label><input type="text" id="job" placeholder="Elektrik Elektronik Mühendisi"></div>
        <div class="form-group"><label>Telefon</label><input type="tel" id="phone" placeholder="05XXXXXXXXX"></div>
        <div class="form-group"><label>E-posta</label><input type="email" id="email" placeholder="mail@gmail.com"></div>
        <div class="form-group"><label>LinkedIn (URL)</label><input type="url" id="linkedin" placeholder="LinkedIn Profil Linkin"></div>
        <button class="main-btn" onclick="olustur()">PAYLAŞILABİLİR KART OLUŞTUR</button>
    </div>

    <div id="resultArea">
        <div id="qrContainer">
            <div id="qrPlaceholder"></div>
            <p style="font-size: 11px; color: #94a3b8;">Bu senin özel QR kodun. Bunu kaydedip paylaşabilirsin.</p>
            <hr style="border: 0.5px solid #334155; margin: 20px 0;">
        </div>
        
        <div class="info-display">
            <div style="font-size: 20px; font-weight: 700; margin-bottom: 15px; color: var(--accent); text-transform: capitalize;" id="dName"></div>
            <div class="info-row"><b>Meslek:</b> <span id="dJob"></span></div>
            <div class="info-row"><b>E-posta:</b> <span id="dMail"></span></div>
            <div class="info-row"><b>LinkedIn:</b> <span id="dLink"></span></div>
        </div>

        <div class="action-buttons">
            <button class="btn-small btn-save" onclick="saveVCard()">Rehbere Ekle</button>
            <button class="btn-small btn-cv" onclick="downloadMiniCV()">CV İndir</button>
        </div>
    </div>
</div>

<script>
    let globalData = {};

    function olustur() {
        const data = {
            n: document.getElementById("name").value,
            j: document.getElementById("job").value,
            p: document.getElementById("phone").value,
            m: document.getElementById("email").value,
            l: document.getElementById("linkedin").value
        };

        if(!data.n) { alert("Lütfen isim girin!"); return; }
        
        // QR kodun içine şu anki URL'yi ve verileri ekle
        const baseUrl = window.location.href.split('?')[0];
        const params = new URLSearchParams(data).toString();
        const finalLink = `${baseUrl}?${params}`;

        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(finalLink)}`;
        document.getElementById("qrPlaceholder").innerHTML = `<img src="${qrUrl}" id="qrImg">`;
        
        globalData = data;
        displayData(data);
    }

    function displayData(data) {
        document.getElementById("formArea").style.display = "none";
        document.getElementById("resultArea").style.display = "block";
        document.getElementById("dName").innerText = data.n;
        document.getElementById("dJob").innerText = data.j || "-";
        document.getElementById("dMail").innerText = data.m || "-";
        document.getElementById("dLink").innerText = data.l || "-";
    }

    function saveVCard() {
        const vCard = `BEGIN:VCARD\nVERSION:3.0\nFN:${globalData.n}\nTITLE:${globalData.j}\nTEL:${globalData.p}\nEMAIL:${globalData.m}\nURL:${globalData.l}\nEND:VCARD`;
        const blob = new Blob([vCard], { type: "text/vcard" });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${globalData.n}.vcf`;
        a.click();
    }

    function downloadMiniCV() {
        const cvContent = `DIJI-CARD PROFESYONEL ÖZET\n\nİSİM: ${globalData.n}\nMESLEK: ${globalData.j}\nTEL: ${globalData.p}\nMAIL: ${globalData.m}\nLINKEDIN: ${globalData.l}\n\nOluşturulma Tarihi: ${new Date().toLocaleDateString('tr-TR')}`;
        const blob = new Blob([cvContent], { type: "text/plain" });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${globalData.n}_CV.txt`;
        a.click();
    }

    // OTOMATİK ÇALIŞTIRMA (QR okutulunca)
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.has('n')) {
            globalData = {
                n: urlParams.get('n'),
                j: urlParams.get('j'),
                p: urlParams.get('p'),
                m: urlParams.get('m'),
                l: urlParams.get('l')
            };
            displayData(globalData);
            // QR okutan kişiye "kendi QR'ını" göstermeye gerek yok, sadece butonları görsün
            document.getElementById("qrContainer").style.display = "none";
            document.getElementById("title").innerText = "KARTVİZİT";
        }
    };
</script>

</body>
</html>
